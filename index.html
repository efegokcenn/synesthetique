<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synesth√©tique ‚Äî Music Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060608;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.09);
  --accent:#d4b896;
  --text:rgba(235,225,210,0.92);
  --dim:rgba(235,225,210,0.4);
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden;user-select:none;}

/* ‚îÄ‚îÄ‚îÄ CANVAS ‚îÄ‚îÄ‚îÄ */
#canvas{position:fixed;inset:0;width:100%;height:100%;}
#freq-canvas{position:fixed;bottom:0;left:0;width:100%;height:100px;z-index:5;pointer-events:none;}

/* ‚îÄ‚îÄ‚îÄ LANDING BACKGROUND CANVAS ‚îÄ‚îÄ‚îÄ */
#landing-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ‚îÄ‚îÄ‚îÄ LANDING ‚îÄ‚îÄ‚îÄ */
#landing{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:56px;
  transition:opacity .8s ease,visibility .8s;
}
#landing.gone{opacity:0;visibility:hidden;pointer-events:none;}

.brand{text-align:center;position:relative;z-index:1;}
.brand-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(52px,7vw,100px);
  letter-spacing:.1em;
  color:#ede0cc;
  line-height:1;
  text-shadow:0 0 80px rgba(212,184,150,.25);
}
.brand-tag{
  font-size:11px;letter-spacing:.55em;
  color:rgba(235,225,210,.45);
  margin-top:10px;text-transform:uppercase;
}

.input-panel{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  width:min(480px,88vw);position:relative;z-index:1;
}

/* Drop zone */
.dropbox{
  width:100%;
  border:1px solid rgba(235,225,210,.12);
  padding:48px 40px;
  display:flex;flex-direction:column;align-items:center;gap:14px;
  cursor:pointer;position:relative;
  transition:border-color .35s,background .35s;
  background:rgba(255,255,255,.018);
  backdrop-filter:blur(6px);
}
.dropbox::before,.dropbox::after{
  content:'';position:absolute;width:22px;height:22px;
  border-color:rgba(212,184,150,.35);border-style:solid;
  transition:border-color .3s;
}
.dropbox::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.dropbox::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.dropbox:hover,.dropbox.drag-over{
  border-color:rgba(212,184,150,.35);
  background:rgba(212,184,150,.04);
}
.dropbox:hover::before,.dropbox:hover::after,
.dropbox.drag-over::before,.dropbox.drag-over::after{border-color:rgba(212,184,150,.7);}

.dropbox-icon{
  width:36px;height:36px;opacity:.35;margin-bottom:4px;
}
.dropbox-title{
  font-family:'Cormorant Garamond',serif;font-size:26px;
  font-style:italic;color:#ede0cc;letter-spacing:.04em;
}
.dropbox-sub{font-size:10px;letter-spacing:.3em;color:rgba(235,225,210,.38);text-transform:uppercase;}
.dropbox-formats{font-size:9px;letter-spacing:.18em;color:rgba(235,225,210,.2);margin-top:2px;}

input[type=file]{display:none;}

/* ‚îÄ‚îÄ‚îÄ HUD ‚îÄ‚îÄ‚îÄ */
#hud{
  position:fixed;inset:0;z-index:20;pointer-events:none;
  opacity:0;transition:opacity .9s;
}
#hud.visible{opacity:1;}

/* top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 32px;
  background:linear-gradient(to bottom,rgba(6,6,8,.88) 0%,transparent 100%);
}
.logo-sm{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:18px;letter-spacing:.18em;color:var(--accent);
  opacity:.65;cursor:pointer;pointer-events:all;
  transition:opacity .2s;
}
.logo-sm:hover{opacity:1;}

#stats{display:flex;gap:28px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.stat-val{font-size:20px;font-weight:700;color:#ede0cc;letter-spacing:.02em;}
.stat-lbl{font-size:8px;letter-spacing:.35em;color:var(--dim);text-transform:uppercase;}

/* mode switcher */
#mode-bar{
  position:absolute;top:50%;right:26px;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:6px;pointer-events:all;
}
.mode-btn{
  background:rgba(6,6,8,.6);
  border:1px solid rgba(255,255,255,.07);
  color:rgba(235,225,210,.3);
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:.2em;padding:9px 12px;
  cursor:pointer;text-transform:uppercase;transition:all .2s;
  white-space:nowrap;text-align:center;min-width:76px;
  backdrop-filter:blur(4px);
}
.mode-btn:hover{color:var(--accent);border-color:rgba(212,184,150,.25);}
.mode-btn.active{
  color:#ede0cc;border-color:rgba(212,184,150,.6);
  background:rgba(212,184,150,.08);
}

/* bottom bar */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;
  padding:18px 32px 24px;
  background:linear-gradient(to top,rgba(6,6,8,.92) 0%,transparent 100%);
  display:flex;flex-direction:column;gap:12px;
}
#progress-wrap{
  width:100%;height:1px;background:rgba(235,225,210,.1);
  cursor:pointer;pointer-events:all;
  position:relative;transition:height .2s;
}
#progress-wrap:hover{height:3px;}
#progress-fill{height:100%;background:var(--accent);width:0%;pointer-events:none;transition:width .1s linear;}
#progress-head{
  position:absolute;right:0;top:50%;transform:translate(50%,-50%);
  width:9px;height:9px;border-radius:50%;background:var(--accent);
  pointer-events:none;opacity:0;transition:opacity .2s;
}
#progress-wrap:hover #progress-head{opacity:1;}

.bottom-row{display:flex;align-items:center;justify-content:space-between;gap:16px;}

#track-info{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1;}
#track-name{
  font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;
  color:#ede0cc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.03em;
}
#track-sub{font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;}

/* playback controls */
#controls{display:flex;align-items:center;gap:14px;pointer-events:all;flex-shrink:0;}
.icon-btn{
  background:none;border:none;cursor:pointer;color:#ede0cc;
  opacity:.55;transition:opacity .2s;padding:4px;display:flex;align-items:center;
}
.icon-btn:hover{opacity:1;}
.icon-btn svg{width:22px;height:22px;fill:currentColor;}
#vol-slider{
  -webkit-appearance:none;width:72px;height:2px;
  background:rgba(235,225,210,.18);outline:none;cursor:pointer;
}
#vol-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  background:var(--accent);border-radius:50%;
}

/* right controls */
.right-controls{display:flex;align-items:center;gap:12px;pointer-events:all;flex-shrink:0;}
#mood-pill{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:15px;letter-spacing:.08em;
  color:rgba(235,225,210,.45);
  border:1px solid rgba(235,225,210,.1);
  padding:5px 14px;
}
.btn-sm{
  background:rgba(6,6,8,.5);
  border:1px solid rgba(235,225,210,.15);
  color:rgba(235,225,210,.7);
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;
  padding:9px 18px;cursor:pointer;text-transform:uppercase;
  transition:all .25s;white-space:nowrap;backdrop-filter:blur(4px);
}
.btn-sm:hover{background:rgba(212,184,150,.07);border-color:rgba(212,184,150,.4);color:#ede0cc;}

/* ‚îÄ‚îÄ‚îÄ NOTIFICATION ‚îÄ‚îÄ‚îÄ */
#notif{
  position:fixed;top:76px;left:50%;transform:translateX(-50%);
  background:rgba(14,14,20,.96);border:1px solid rgba(235,225,210,.1);
  font-size:9px;letter-spacing:.2em;color:var(--accent);
  padding:10px 28px;z-index:80;
  opacity:0;transition:opacity .3s;pointer-events:none;
  text-transform:uppercase;white-space:nowrap;
}
#notif.show{opacity:1;}

/* beat flash */
#beat-ring{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity .05s;}
</style>
</head>
<body>

<div id="beat-ring"></div>
<canvas id="landing-canvas"></canvas>
<canvas id="canvas"></canvas>
<canvas id="freq-canvas"></canvas>

<!-- ‚îÄ‚îÄ‚îÄ LANDING ‚îÄ‚îÄ‚îÄ -->
<div id="landing">
  <div class="brand">
    <div class="brand-name">Synesth√©tique</div>
    <div class="brand-tag">music visualizer</div>
  </div>
  <div class="input-panel">
    <div class="dropbox" id="dropbox">
      <svg class="dropbox-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(235,225,210,0.6)" stroke-width="1.2">
        <path d="M9 18V12m0 0l-2 2m2-2l2 2M3 16c0 2.2 1.8 4 4 4h10c2.2 0 4-1.8 4-4 0-1.9-1.3-3.4-3.1-3.9C17.6 8.9 15.5 7 13 7c-2 0-3.8 1.1-4.8 2.8C6.3 10 5 11.4 5 13c0 .4.1.8.2 1.2"/>
      </svg>
      <div class="dropbox-title">drop a track here</div>

    </div>

</div>

<!-- ‚îÄ‚îÄ‚îÄ HUD ‚îÄ‚îÄ‚îÄ -->
<div id="hud">
  <div id="topbar">
    <div class="logo-sm" id="logo-sm-btn">Synesth√©tique</div>
    <div id="stats">
      <div class="stat"><div class="stat-val" id="bpm-val">‚Äî</div><div class="stat-lbl">BPM</div></div>
      <div class="stat"><div class="stat-val" id="key-val">‚Äî</div><div class="stat-lbl">KEY</div></div>
      <div class="stat"><div class="stat-val" id="energy-val">‚Äî</div><div class="stat-lbl">ENERGY</div></div>
    </div>
  </div>

  <div id="mode-bar">
    <button class="mode-btn active" data-mode="orbital">Orbital</button>
    <button class="mode-btn" data-mode="waveform">Waveform</button>

        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">

</div>

<div id="notif"></div>
<input type="file" id="file-input-hidden" accept="audio/*" style="display:none">
<audio id="audio" crossorigin="anonymous"></audio>

<script>
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  Synesth√©tique ‚Äî Music Visualizer
//  Modes: orbital ¬∑ waveform ¬∑ tunnel ¬∑ particles
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

const $ = id => document.getElementById(id);
const canvas = $('canvas'), ctx = canvas.getContext('2d');
const freqCanvas = $('freq-canvas'), fCtx = freqCanvas.getContext('2d');
const landingCanvas = $('landing-canvas'), lCtx = landingCanvas.getContext('2d');
const audio = $('audio');

// ‚îÄ‚îÄ Resize ‚îÄ‚îÄ
function resize(){
  canvas.width = freqCanvas.width = landingCanvas.width = innerWidth;
  canvas.height = innerHeight;
  freqCanvas.height = 100;
  landingCanvas.height = innerHeight;
}
resize(); window.addEventListener('resize', resize);

// ‚îÄ‚îÄ State ‚îÄ‚îÄ
let audioCtx, analyser, gainNode, srcNode;
let freqData, waveData;
let playing = false, frame = 0, landingFrame = 0;
let visualMode = 'orbital';
let colorHue = 200, targetHue = 200;
let bpmSmooth = 120, detectedBpm = 120;
let dominantNote = 'C';
let moodLabel = 'ambient';
let energyHistory = [], beatHistory = [], lastKick = 0;
let particles = [], rings = [];
let bgHue = 200;
let onLanding = true;

// ‚îÄ‚îÄ Maps ‚îÄ‚îÄ
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_HUE = {C:0,'C#':30,D:60,'D#':90,E:120,F:150,'F#':180,G:210,'G#':240,A:270,'A#':300,B:330};
const MOODS = [
  {label:'euphoric',  minBpm:150, minE:.45, hue:285},
  {label:'energetic', minBpm:130, minE:.38, hue:20},
  {label:'driving',   minBpm:110, minE:.30, hue:200},
  {label:'groovy',    minBpm:90,  minE:.22, hue:140},
  {label:'melancholic',maxBpm:80, maxE:.2,  hue:225},
  {label:'dreamy',    maxBpm:95,  maxE:.28, hue:265},
  {label:'ambient',   minBpm:0,   minE:0,   hue:180},
];

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  LANDING ANIMATION ‚Äî slow breathing orbs
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
const orbs = Array.from({length:6}, (_,i) => ({
  x: 0.15 + Math.random() * 0.7,
  y: 0.15 + Math.random() * 0.7,
  r: 0.18 + Math.random() * 0.22,
  hue: [200, 240, 260, 180, 220, 210][i],
  speed: 0.0003 + Math.random() * 0.0003,
  phase: Math.random() * Math.PI * 2,
  drift: { x: (Math.random()-.5)*0.00015, y: (Math.random()-.5)*0.00015 },
}));

function drawLanding(t){
  const W = landingCanvas.width, H = landingCanvas.height;
  lCtx.clearRect(0,0,W,H);

  // deep base
  lCtx.fillStyle = '#060608';
  lCtx.fillRect(0,0,W,H);

  // orbs
  orbs.forEach(o => {
    o.x += o.drift.x; o.y += o.drift.y;
    if(o.x < 0.05 || o.x > 0.95) o.drift.x *= -1;
    if(o.y < 0.05 || o.y > 0.95) o.drift.y *= -1;
    const pulse = Math.sin(t * o.speed * 1000 + o.phase) * 0.12 + 0.88;
    const cx = o.x * W, cy = o.y * H;
    const r = o.r * Math.min(W, H) * pulse;
    const g = lCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0,   `hsla(${o.hue}, 55%, 35%, 0.14)`);
    g.addColorStop(0.5, `hsla(${o.hue}, 50%, 25%, 0.06)`);
    g.addColorStop(1,   `hsla(${o.hue}, 45%, 20%, 0)`);
    lCtx.fillStyle = g;
    lCtx.fillRect(0,0,W,H);
  });

  // very faint grain-like noise overlay for texture
  lCtx.save();
  lCtx.globalAlpha = 0.018;
  for(let i=0;i<300;i++){
    const x=Math.random()*W, y=Math.random()*H;
    lCtx.fillStyle = `rgba(255,255,255,${Math.random()})`;
    lCtx.fillRect(x,y,1,1);
  }
  lCtx.restore();
}

function landingLoop(){
  if(!onLanding) return;
  landingFrame++;
  drawLanding(performance.now());
  requestAnimationFrame(landingLoop);
}
landingLoop();

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  AUDIO
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function setupAudio(src){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = +($('vol-slider').value);
    srcNode = audioCtx.createMediaElementSource(audio);
    srcNode.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    waveData = new Uint8Array(analyser.frequencyBinCount);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  audio.src = src; audio.play();
  playing = true;
  onLanding = false;
  $('hud').classList.add('visible');
  $('landing').classList.add('gone');
  particles = []; rings = [];
  energyHistory = []; beatHistory = []; lastKick = 0;
}

function loadFile(file){
  setupAudio(URL.createObjectURL(file));
  $('track-name').textContent = file.name.replace(/\.[^.]+$/,'');
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  ANALYSIS
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function getBands(){
  if(!analyser) return {sub:0,bass:0,mid:0,presence:0,high:0,overall:0};
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(waveData);
  const bin = audioCtx.sampleRate / analyser.fftSize;
  function avg(lo,hi){
    const a=Math.round(lo/bin), b=Math.min(Math.round(hi/bin),freqData.length-1);
    if(b<=a) return 0;
    let s=0; for(let i=a;i<=b;i++) s+=freqData[i];
    return s/((b-a+1)*255);
  }
  return {sub:avg(20,60),bass:avg(60,250),mid:avg(250,2000),presence:avg(2000,6000),high:avg(6000,20000),overall:avg(20,20000)};
}

function detectBeat(bands){
  const now = performance.now();
  const e = bands.bass*.65+bands.sub*.35;
  energyHistory.push(e);
  if(energyHistory.length>43) energyHistory.shift();
  const avg = energyHistory.reduce((a,b)=>a+b,0)/energyHistory.length;
  const variance = energyHistory.reduce((a,b)=>a+(b-avg)**2,0)/energyHistory.length;
  const C = 1.35+variance*180;
  if(e > C*avg && now-lastKick > 230){
    const delta = now-lastKick;
    if(delta>200&&delta<2000){
      beatHistory.push(delta);
      if(beatHistory.length>8) beatHistory.shift();
      if(beatHistory.length>=4){
        let bpm = Math.round(60000/(beatHistory.reduce((a,b)=>a+b,0)/beatHistory.length));
        if(bpm>200) bpm=Math.round(bpm/2);
        if(bpm<60)  bpm=bpm*2;
        bpmSmooth += (bpm-bpmSmooth)*.1;
      }
    }
    lastKick=now; return true;
  }
  return false;
}

function detectNote(){
  if(!analyser||!audioCtx) return 'C';
  const bin = audioCtx.sampleRate/analyser.fftSize;
  const lo=Math.round(80/bin), hi=Math.min(Math.round(1000/bin),freqData.length-1);
  let max=0,idx=lo;
  for(let i=lo;i<=hi;i++) if(freqData[i]>max){max=freqData[i];idx=i;}
  const midi = Math.round(12*Math.log2((idx*bin)/440)+69);
  return NOTES[((midi%12)+12)%12];
}

function classifyMood(bands,bpm){
  for(const m of MOODS){
    const okBpmMin=m.minBpm===undefined||bpm>=m.minBpm;
    const okBpmMax=m.maxBpm===undefined||bpm<=m.maxBpm;
    const okEMin=m.minE===undefined||bands.overall>=m.minE;
    const okEMax=m.maxE===undefined||bands.overall<=m.maxE;
    if(okBpmMin&&okBpmMax&&okEMin&&okEMax) return m;
  }
  return MOODS[MOODS.length-1];
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  PARTICLES & RINGS
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
class Particle{
  constructor(x,y,hue,spd,sz,life){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*spd; this.vy=(Math.random()-.5)*spd-Math.random()*spd*.5;
    this.hue=hue;this.sz=sz;this.life=life;this.maxLife=life;
    this.sat=55+Math.random()*35;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.025;this.vx*=.98;this.life--;this.sz*=.993;}
  draw(){
    const a=this.life/this.maxLife;
    ctx.save();ctx.globalAlpha=a*.85;
    ctx.fillStyle=`hsl(${this.hue},${this.sat}%,70%)`;
    ctx.shadowBlur=this.sz*4;ctx.shadowColor=`hsl(${this.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.sz),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

class Ring{
  constructor(x,y,hue){
    this.x=x;this.y=y;this.r=0;
    this.maxR=Math.min(canvas.width,canvas.height)*.5;
    this.hue=hue;this.alpha=.65;this.dead=false;this.speed=7+Math.random()*4;
  }
  update(){this.r+=this.speed;this.alpha=.65*(1-this.r/this.maxR);if(this.r>=this.maxR)this.dead=true;}
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.alpha);
    ctx.strokeStyle=`hsl(${this.hue},72%,65%)`;ctx.lineWidth=1.5;
    ctx.shadowBlur=18;ctx.shadowColor=`hsl(${this.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  DRAW ‚Äî BACKGROUND
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function drawBackground(bands){
  bgHue += (targetHue-bgHue)*.004;
  const W=canvas.width, H=canvas.height;

  // base fill
  ctx.fillStyle='#060608';
  ctx.fillRect(0,0,W,H);

  // mood color bloom from center
  const bloom = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  bloom.addColorStop(0,   `hsla(${bgHue},40%,18%,${0.28+bands.overall*.2})`);
  bloom.addColorStop(0.5, `hsla(${bgHue+15},30%,10%,${0.15+bands.overall*.1})`);
  bloom.addColorStop(1,   `hsla(${bgHue+25},20%,5%,0)`);
  ctx.fillStyle=bloom; ctx.fillRect(0,0,W,H);

  // subtle secondary bloom offset
  const bloom2 = ctx.createRadialGradient(W*.65,H*.35,0,W*.65,H*.35,Math.max(W,H)*.45);
  bloom2.addColorStop(0,  `hsla(${bgHue+60},35%,15%,${0.1+bands.bass*.08})`);
  bloom2.addColorStop(1,  `hsla(${bgHue+60},25%,8%,0)`);
  ctx.fillStyle=bloom2; ctx.fillRect(0,0,W,H);
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  DRAW ‚Äî VISUAL MODES
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

// ‚îÄ‚îÄ Orbital ‚îÄ‚îÄ
function drawOrbital(bands,isBeat){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  const baseR=Math.min(W,H)*.26+bands.bass*70;
  const spikes=Math.round(5+bands.mid*10);
  [[.28,spikes,t*.5,.55,2],[.16,spikes*2,-t*.75,.30,1.5],[.09,spikes*3,t*1.1,.16,1]].forEach(([amp,freq,phase,op,lw],li)=>{
    const pts=360;
    ctx.save();
    ctx.globalAlpha=op*(0.3+bands.overall*.7);
    ctx.strokeStyle=`hsl(${colorHue+li*28},72%,65%)`;
    ctx.lineWidth=lw;ctx.shadowBlur=14;ctx.shadowColor=`hsl(${colorHue+li*28},90%,70%)`;
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      const bi=Math.floor((i/pts)*freqData.length/4);
      const fd=freqData?(freqData[bi]/255)*.35:0;
      const r=baseR*(1+Math.sin(a*freq+phase)*amp+fd*bands.bass);
      i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  });
  const gr=40+bands.bass*90+(isBeat?50:0);
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
  grd.addColorStop(0,`hsla(${colorHue},80%,85%,.5)`);
  grd.addColorStop(1,`hsla(${colorHue},80%,60%,0)`);
  ctx.save();ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ‚îÄ‚îÄ Waveform ‚îÄ‚îÄ
function drawWaveform(bands){
  const W=canvas.width,H=canvas.height,t=frame/60;
  if(!waveData) return;
  for(let l=0;l<3;l++){
    const offset=H*.5+((l-1)*H*.08);
    const amp=(H*.25)*(1+bands.bass*.8)*(1-l*.2);
    const hue=colorHue+l*25;
    ctx.save();
    ctx.globalAlpha=.7-l*.15;
    ctx.strokeStyle=`hsl(${hue},70%,65%)`;
    ctx.lineWidth=2-l*.4;
    ctx.shadowBlur=12;ctx.shadowColor=`hsl(${hue},90%,70%)`;
    ctx.beginPath();
    for(let i=0;i<waveData.length;i++){
      const x=(i/waveData.length)*W;
      const sample=(waveData[i]/128-1);
      const waveMod=Math.sin(i*.01+t*(1+l*.3))*.15;
      const y=offset+sample*amp*(1+waveMod);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.restore();
  }
  ctx.save();ctx.globalAlpha=.12;ctx.strokeStyle=`hsl(${colorHue},50%,50%)`;
  ctx.lineWidth=.5;ctx.setLineDash([4,10]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}

// ‚îÄ‚îÄ Tunnel ‚îÄ‚îÄ
let tunnelDepth=0;
function drawTunnel(bands,isBeat){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  tunnelDepth+=.015*(1+bands.bass);
  for(let i=20;i>=0;i--){
    const phase=(i/20+tunnelDepth)%1;
    const sz=phase*Math.min(W,H)*.7;
    const alpha=(1-phase)*.6*(bands.overall*.5+.5);
    const hue=colorHue+(phase*60)+t*5;
    const sides=Math.round(4+bands.mid*6);
    const twist=phase*Math.PI*.5+t*.3;
    const warp=1+Math.sin(t*2+i)*bands.bass*.3;
    ctx.save();ctx.globalAlpha=alpha;
    ctx.strokeStyle=`hsl(${hue},72%,65%)`;ctx.lineWidth=1.5;
    ctx.shadowBlur=20;ctx.shadowColor=`hsl(${hue},90%,70%)`;
    ctx.beginPath();
    for(let j=0;j<=sides;j++){
      const a=(j/sides)*Math.PI*2+twist;
      j===0?ctx.moveTo(cx+Math.cos(a)*sz*.5*warp,cy+Math.sin(a)*sz*.5/warp)
           :ctx.lineTo(cx+Math.cos(a)*sz*.5*warp,cy+Math.sin(a)*sz*.5/warp);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  }
}

// ‚îÄ‚îÄ Particle Field ‚îÄ‚îÄ
let fieldParticles=[];
function initFieldParticles(){
  fieldParticles=Array.from({length:150},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.5, vy:(Math.random()-.5)*.5,
    size:Math.random()*2+.5, hue:Math.random()*360, alpha:Math.random()*.5+.2
  }));
}
function drawParticleField(bands){
  const W=canvas.width,H=canvas.height,t=frame/60;
  fieldParticles.forEach(p=>{
    const bi=Math.min(Math.floor(p.x/W*8)*8+Math.floor(p.y/H*8),freqData?freqData.length-1:0);
    const force=(freqData?freqData[bi]/255:0)*.5;
    const angle=Math.sin(p.x*.005+t)+Math.cos(p.y*.005+t);
    p.vx+=Math.cos(angle)*force*.3; p.vy+=Math.sin(angle)*force*.3+bands.bass*.05;
    p.vx*=.97; p.vy*=.97;
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    p.hue=(colorHue+(p.x/W)*60)%360;
    ctx.save();ctx.globalAlpha=p.alpha*(0.4+bands.overall*.6);
    ctx.fillStyle=`hsl(${p.hue},70%,70%)`;
    ctx.shadowBlur=p.size*3;ctx.shadowColor=`hsl(${p.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1+bands.bass*.5),0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  ctx.save();ctx.lineWidth=.3;
  for(let i=0;i<fieldParticles.length;i+=3){
    for(let j=i+1;j<fieldParticles.length;j+=3){
      const dx=fieldParticles[i].x-fieldParticles[j].x, dy=fieldParticles[i].y-fieldParticles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){
        ctx.globalAlpha=(.8-d/80)*.12*bands.overall;
        ctx.strokeStyle=`hsl(${colorHue},60%,65%)`;
        ctx.beginPath();ctx.moveTo(fieldParticles[i].x,fieldParticles[i].y);
        ctx.lineTo(fieldParticles[j].x,fieldParticles[j].y);ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// ‚îÄ‚îÄ Freq bars overlay ‚îÄ‚îÄ
function drawFreqOverlay(){
  if(!freqData) return;
  const W=freqCanvas.width,H=freqCanvas.height,count=96,barW=W/count;
  fCtx.clearRect(0,0,W,H);
  for(let i=0;i<count;i++){
    const val=freqData[Math.floor(i/count*freqData.length*.5)]/255;
    const bh=val*H*.85;
    fCtx.fillStyle=`hsla(${colorHue+(i/count)*50},68%,62%,${.2+val*.4})`;
    fCtx.fillRect(i*barW,H-bh,barW-1,bh);
  }
}

// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
//  MAIN LOOP
// ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
function loop(){
  requestAnimationFrame(loop);
  frame++;

  if(onLanding){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }

  const bands=getBands();
  const isBeat=detectBeat(bands);
  dominantNote=detectNote();
  const mood=classifyMood(bands,bpmSmooth);
  moodLabel=mood.label;
  targetHue=(mood.hue*.55+(NOTE_HUE[dominantNote]||0)*.45);
  colorHue+=(targetHue-colorHue)*.018;

  drawBackground(bands);

  if(isBeat && playing){
    $('beat-ring').style.opacity='1';
    $('beat-ring').style.boxShadow=`inset 0 0 160px hsla(${colorHue},80%,70%,.065)`;
    setTimeout(()=>{ $('beat-ring').style.opacity='0'; },90);
    rings.push(new Ring(canvas.width/2,canvas.height/2,colorHue));
    for(let i=0;i<Math.floor(6+bands.bass*18);i++){
      const a=Math.random()*Math.PI*2, d=Math.random()*180;
      particles.push(new Particle(canvas.width/2+Math.cos(a)*d,canvas.height/2+Math.sin(a)*d,colorHue+(Math.random()-.5)*50,3+bands.bass*7,1+Math.random()*3,45+Math.random()*55));
    }
  }
  if(playing && Math.random()<bands.high*.25+.015 && particles.length<400){
    particles.push(new Particle(Math.random()*canvas.width,canvas.height+5,colorHue+(Math.random()-.5)*40,1.5+Math.random()*2,.5+Math.random()*1.5,90+Math.random()*120));
  }

  switch(visualMode){
    case 'orbital':   drawOrbital(bands,isBeat); break;
    case 'waveform':  drawWaveform(bands); break;
    case 'tunnel':    drawTunnel(bands,isBeat); break;
    case 'particles': drawParticleField(bands); break;
  }

  rings.forEach(r=>{r.update();r.draw();}); rings=rings.filter(r=>!r.dead);
  particles.forEach(p=>{p.update();p.draw();}); particles=particles.filter(p=>p.life>0);
  drawFreqOverlay();

  if(playing){
    $('bpm-val').textContent=Math.round(bpmSmooth)||'‚Äî';
    $('key-val').textContent=dominantNote;
    $('energy-val').textContent=Math.round(bands.overall*100)+'%';
    $('mood-pill').textContent=moodLabel;
    if(audio.duration) $('progress-fill').style.width=(audio.currentTime/audio.duration*100)+'%';
  }
}
loop();

    const modes=['orbital','waveform','tunnel','particles'];
    const next=modes[(modes.indexOf(visualMode)+1)%modes.length];
    visualMode=next;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===next));
    if(next==='particles') initFieldParticles();
    tunnelDepth=0;
  }
});

// Notify
let notifTimer;
function notify(msg){
  const el=$('notif');el.textContent=msg;el.classList.add('show');
  clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),2800);
}
</script>
</body>
