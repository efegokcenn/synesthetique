<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synesthétique — Music Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#07070d;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --accent:#d4b896;
  --text:rgba(212,184,150,0.9);
  --dim:rgba(212,184,150,0.35);
  --red:#ff4466;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;overflow:hidden;user-select:none;}

/* ─── CANVAS ─── */
#canvas{position:fixed;inset:0;width:100%;height:100%;}
#freq-canvas{position:fixed;bottom:0;left:0;width:100%;height:100px;z-index:5;pointer-events:none;}

/* ─── LANDING ─── */
#landing{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:48px;
  background:var(--bg);
  transition:opacity .7s ease,visibility .7s;
}
#landing.gone{opacity:0;visibility:hidden;}

.brand{text-align:center;}
.brand-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(36px,5vw,72px);letter-spacing:.12em;color:var(--accent);
  line-height:1;
}
.brand-tag{font-size:10px;letter-spacing:.5em;color:var(--dim);margin-top:6px;text-transform:uppercase;}

.input-panel{display:flex;flex-direction:column;gap:16px;width:min(520px,90vw);}

/* Drop zone */
.dropbox{
  border:1px solid var(--border);padding:36px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  cursor:pointer;position:relative;transition:border-color .3s,background .3s;
}
.dropbox::before,.dropbox::after{
  content:'';position:absolute;width:20px;height:20px;
  border-color:rgba(212,184,150,.4);border-style:solid;
}
.dropbox::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.dropbox::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.dropbox:hover,.dropbox.drag-over{border-color:rgba(212,184,150,.4);background:rgba(212,184,150,.03);}
.dropbox-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--accent);}
.dropbox-sub{font-size:9px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;}

/* divider */
.or{display:flex;align-items:center;gap:16px;font-size:9px;letter-spacing:.3em;color:var(--dim);}
.or::before,.or::after{content:'';flex:1;height:1px;background:var(--border);}

/* YouTube input */
.yt-row{display:flex;gap:8px;}
.yt-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Space Mono',monospace;font-size:11px;
  padding:10px 14px;outline:none;transition:border-color .2s;
}
.yt-input:focus{border-color:rgba(212,184,150,.4);}
.yt-input::placeholder{color:var(--dim);}
.btn-sm{
  background:none;border:1px solid var(--border);color:var(--accent);
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;
  padding:10px 18px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;
}
.btn-sm:hover{background:rgba(212,184,150,.06);border-color:rgba(212,184,150,.4);}

.yt-note{font-size:9px;color:var(--dim);letter-spacing:.05em;line-height:1.6;text-align:center;}

input[type=file]{display:none;}

/* ─── HUD ─── */
#hud{
  position:fixed;inset:0;z-index:20;pointer-events:none;
  opacity:0;transition:opacity .8s;
}
#hud.visible{opacity:1;}

/* top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 28px;
  background:linear-gradient(to bottom,rgba(7,7,13,.85) 0%,transparent 100%);
}
.logo-sm{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;letter-spacing:.15em;color:var(--accent);opacity:.7;cursor:pointer;pointer-events:all;transition:opacity .2s;}
.logo-sm:hover{opacity:1;}

#stats{display:flex;gap:24px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.stat-val{font-size:18px;font-weight:700;color:var(--accent);}
.stat-lbl{font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;}

/* mode switcher */
#mode-bar{
  position:absolute;top:50%;right:24px;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:6px;pointer-events:all;
}
.mode-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--dim);font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:.2em;padding:8px 10px;
  cursor:pointer;text-transform:uppercase;transition:all .2s;
  writing-mode:horizontal-tb;white-space:nowrap;
  text-align:center;min-width:72px;
}
.mode-btn:hover{color:var(--accent);border-color:rgba(212,184,150,.3);}
.mode-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(212,184,150,.07);}

/* bottom bar */
#bottombar{
  position:absolute;bottom:0;left:0;right:0;
  padding:16px 28px 20px;
  background:linear-gradient(to top,rgba(7,7,13,.9) 0%,transparent 100%);
  display:flex;flex-direction:column;gap:10px;
}
#progress-wrap{
  width:100%;height:2px;background:rgba(212,184,150,.1);
  cursor:pointer;pointer-events:all;transition:height .2s;
  position:relative;
}
#progress-wrap:hover{height:4px;}
#progress-fill{height:100%;background:var(--accent);width:0%;pointer-events:none;}
#progress-head{
  position:absolute;right:0;top:50%;transform:translate(50%,-50%);
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  pointer-events:none;display:none;
}
#progress-wrap:hover #progress-head{display:block;}

.bottom-row{display:flex;align-items:center;justify-content:space-between;gap:16px;}

#track-info{display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;}
#track-name{
  font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;
  color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#track-sub{font-size:8px;letter-spacing:.25em;color:var(--dim);text-transform:uppercase;}

/* playback controls */
#controls{display:flex;align-items:center;gap:12px;pointer-events:all;flex-shrink:0;}
.icon-btn{
  background:none;border:none;cursor:pointer;color:var(--accent);
  opacity:.6;transition:opacity .2s;padding:4px;display:flex;align-items:center;
}
.icon-btn:hover{opacity:1;}
.icon-btn svg{width:20px;height:20px;fill:currentColor;}
#vol-slider{
  -webkit-appearance:none;width:64px;height:2px;
  background:rgba(212,184,150,.2);outline:none;cursor:pointer;
}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--accent);border-radius:50%;}

/* right controls */
.right-controls{display:flex;align-items:center;gap:10px;pointer-events:all;flex-shrink:0;}
#mood-pill{
  font-size:9px;letter-spacing:.2em;color:var(--dim);
  border:1px solid var(--border);padding:5px 12px;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;
}
.ctrl-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--dim);font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:.15em;padding:6px 10px;
  cursor:pointer;text-transform:uppercase;transition:all .2s;
}
.ctrl-btn:hover{color:var(--accent);border-color:rgba(212,184,150,.3);}
.ctrl-btn.active{color:var(--accent);border-color:rgba(212,184,150,.5);background:rgba(212,184,150,.06);}

/* ─── TAP BPM OVERLAY ─── */
#tap-overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(7,7,13,.92);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  opacity:0;visibility:hidden;transition:all .3s;
}
#tap-overlay.open{opacity:1;visibility:visible;}
.tap-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:32px;color:var(--accent);}
#tap-btn{
  width:180px;height:180px;border-radius:50%;
  border:1px solid rgba(212,184,150,.3);background:rgba(212,184,150,.05);
  color:var(--accent);font-family:'Space Mono',monospace;
  font-size:11px;letter-spacing:.2em;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  transition:all .1s;text-transform:uppercase;
}
#tap-btn:active{background:rgba(212,184,150,.12);transform:scale(.97);}
#tap-bpm-display{font-size:48px;font-weight:700;color:var(--accent);}
#tap-bpm-sub{font-size:9px;letter-spacing:.3em;color:var(--dim);}
.tap-actions{display:flex;gap:12px;}

/* ─── KEY OVERLAY ─── */
#key-overlay{
  position:fixed;inset:0;z-index:60;
  background:rgba(7,7,13,.92);backdrop-filter:blur(8px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  opacity:0;visibility:hidden;transition:all .3s;
}
#key-overlay.open{opacity:1;visibility:visible;}
.key-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:32px;color:var(--accent);}
.key-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;width:min(400px,90vw);}
.key-chip{
  background:var(--surface);border:1px solid var(--border);
  color:var(--dim);font-family:'Space Mono',monospace;font-size:11px;
  padding:12px 8px;cursor:pointer;text-align:center;
  transition:all .2s;
}
.key-chip:hover{color:var(--accent);border-color:rgba(212,184,150,.4);}
.key-chip.selected{color:var(--bg);background:var(--accent);border-color:var(--accent);}
.key-modes{display:flex;gap:8px;}
.key-mode-btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--dim);font-family:'Space Mono',monospace;font-size:9px;
  letter-spacing:.2em;padding:8px 20px;cursor:pointer;text-transform:uppercase;transition:all .2s;
}
.key-mode-btn.active{color:var(--accent);border-color:rgba(212,184,150,.5);}

/* ─── NOTIFICATION ─── */
#notif{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:rgba(20,20,30,.95);border:1px solid var(--border);
  font-size:10px;letter-spacing:.15em;color:var(--accent);
  padding:10px 24px;z-index:80;
  opacity:0;transition:opacity .3s;pointer-events:none;
  text-transform:uppercase;
}
#notif.show{opacity:1;}

/* beat flash ring */
#beat-ring{
  position:fixed;inset:0;pointer-events:none;z-index:4;
  opacity:0;transition:opacity .05s;
}
</style>
</head>
<body>

<div id="beat-ring"></div>
<canvas id="canvas"></canvas>
<canvas id="freq-canvas"></canvas>

<!-- ─── LANDING ─── -->
<div id="landing">
  <div class="brand">
    <div class="brand-name">Synesthétique</div>
    <div class="brand-tag">music visualizer</div>
  </div>
  <div class="input-panel">
    <div class="dropbox" id="dropbox">
      <div class="dropbox-title">drop an audio file</div>
      <div class="dropbox-sub">mp3 · wav · ogg · flac · aac · m4a</div>
      <input type="file" id="file-input" accept="audio/*">
    </div>
    <div class="or">or</div>
    <div class="yt-row">
      <input class="yt-input" id="yt-input" type="text" placeholder="paste a YouTube URL…" spellcheck="false">
      <button class="btn-sm" id="yt-btn">Load</button>
    </div>
    <div class="yt-note">
      YouTube audio loads via a CORS proxy — works for most videos.<br>
      If it fails, try a direct file upload instead.
    </div>
  </div>
</div>

<!-- ─── TAP BPM OVERLAY ─── -->
<div id="tap-overlay">
  <div class="tap-title">Tap to detect BPM</div>
  <div id="tap-btn">
    <div id="tap-bpm-display">—</div>
    <div id="tap-bpm-sub">tap the beat</div>
  </div>
  <div class="tap-actions">
    <button class="btn-sm" id="tap-reset">Reset</button>
    <button class="btn-sm" id="tap-confirm">Confirm</button>
    <button class="btn-sm" id="tap-cancel">Cancel</button>
  </div>
</div>

<!-- ─── KEY OVERRIDE OVERLAY ─── -->
<div id="key-overlay">
  <div class="key-title">Select key</div>
  <div class="key-modes">
    <button class="key-mode-btn active" id="mode-major">Major</button>
    <button class="key-mode-btn" id="mode-minor">Minor</button>
  </div>
  <div class="key-grid" id="key-grid"></div>
  <div class="tap-actions">
    <button class="btn-sm" id="key-auto">Auto detect</button>
    <button class="btn-sm" id="key-cancel">Cancel</button>
  </div>
</div>

<!-- ─── HUD ─── -->
<div id="hud">
  <div id="topbar">
    <div class="logo-sm" id="logo-sm-btn">Synesthétique</div>
    <div id="stats">
      <div class="stat"><div class="stat-val" id="bpm-val">—</div><div class="stat-lbl">BPM</div></div>
      <div class="stat"><div class="stat-val" id="key-val">—</div><div class="stat-lbl">KEY</div></div>
      <div class="stat"><div class="stat-val" id="energy-val">—</div><div class="stat-lbl">ENERGY</div></div>
    </div>
  </div>

  <!-- Mode switcher -->
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="orbital">Orbital</button>
    <button class="mode-btn" data-mode="waveform">Waveform</button>
    <button class="mode-btn" data-mode="tunnel">Tunnel</button>
    <button class="mode-btn" data-mode="particles">Particles</button>
  </div>

  <div id="bottombar">
    <div id="progress-wrap">
      <div id="progress-fill"></div>
      <div id="progress-head"></div>
    </div>
    <div class="bottom-row">
      <div id="track-info">
        <div id="track-name">—</div>
        <div id="track-sub">now playing</div>
      </div>
      <div id="controls">
        <button class="icon-btn" id="btn-play" title="Play/Pause">
          <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
      </div>
      <div class="right-controls">
        <div id="mood-pill">—</div>
        <button class="btn-sm" id="btn-new">+ Track</button>
      </div>
    </div>
  </div>
</div>

<div id="notif"></div>

<input type="file" id="file-input-hidden" accept="audio/*" style="display:none">
<audio id="audio" crossorigin="anonymous"></audio>

<script>
// ════════════════════════════════════════════════════════
// Synesthétique — Full Music Visualizer
//  Modes: orbital · waveform · spectrum · kaleidoscope · tunnel · particles
// ════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const canvas = $('canvas'), ctx = canvas.getContext('2d');
const freqCanvas = $('freq-canvas'), fCtx = freqCanvas.getContext('2d');
const audio = $('audio');

// ── Resize ──
function resize(){
  canvas.width = freqCanvas.width = innerWidth;
  canvas.height = innerHeight;
  freqCanvas.height = 100;
}
resize(); window.addEventListener('resize', resize);

// ── State ──
let audioCtx, analyser, gainNode, srcNode;
let freqData, waveData;
let playing = false, frame = 0;
let visualMode = 'orbital';
let colorHue = 200, targetHue = 200;
let bpmSmooth = 120, detectedBpm = 120, manualBpm = null;
let dominantNote = 'C', manualKey = null, keyMode = 'Major';
let moodLabel = 'ambient';
let energyHistory = [], beatHistory = [], lastKick = 0;
let particles = [], rings = [];
let bgHue = 200;

// ── Note / Color maps ──
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_HUE = {C:0,'C#':30,D:60,'D#':90,E:120,F:150,'F#':180,G:210,'G#':240,A:270,'A#':300,B:330};
const MOODS = [
  {label:'euphoric', minBpm:150, minE:.45, hue:285},
  {label:'energetic',minBpm:130, minE:.38, hue:20},
  {label:'driving',  minBpm:110, minE:.30, hue:200},
  {label:'groovy',   minBpm:90,  minE:.22, hue:140},
  {label:'melancholic',maxBpm:80,maxE:.2,  hue:225},
  {label:'dreamy',   maxBpm:95,  maxE:.28, hue:265},
  {label:'ambient',  minBpm:0,   minE:0,   hue:180},
];

// ── Audio setup ──
function setupAudio(src){
  if(!audioCtx){
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    gainNode = audioCtx.createGain();
    gainNode.gain.value = +($('vol-slider').value);
    srcNode = audioCtx.createMediaElementSource(audio);
    srcNode.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    freqData = new Uint8Array(analyser.frequencyBinCount);
    waveData = new Uint8Array(analyser.frequencyBinCount);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  audio.src = src; audio.play();
  playing = true;
  $('hud').classList.add('visible');
  $('landing').classList.add('gone');
  particles = []; rings = [];
  energyHistory = []; beatHistory = []; lastKick = 0;
}

function loadFile(file){
  setupAudio(URL.createObjectURL(file));
  $('track-name').textContent = file.name.replace(/\.[^.]+$/,'');
}

// ── YouTube proxy loading ──
// We use a public invidious/piped instance to extract audio
async function loadYouTube(url){
  notify('Fetching YouTube audio…');
  const id = extractYTId(url);
  if(!id){ notify('Invalid YouTube URL'); return; }

  // Try multiple proxy approaches
  const proxies = [
    `https://inv.nadeko.net/api/v1/videos/${id}`,
    `https://invidious.slippery.city/api/v1/videos/${id}`,
    `https://yewtu.be/api/v1/videos/${id}`,
  ];

  let audioUrl = null;
  for(const proxy of proxies){
    try{
      const r = await fetch(proxy);
      if(!r.ok) continue;
      const data = await r.json();
      // Find best audio format
      const fmts = (data.adaptiveFormats||[]).filter(f=>f.type&&f.type.startsWith('audio'));
      fmts.sort((a,b)=>(b.bitrate||0)-(a.bitrate||0));
      if(fmts.length){ audioUrl = fmts[0].url; break; }
    }catch(e){ continue; }
  }

  if(!audioUrl){
    notify('Could not fetch audio — try uploading the file directly');
    return;
  }

  // Try loading directly (CORS may block)
  try{
    setupAudio(audioUrl);
    $('track-name').textContent = `YouTube: ${id}`;
    notify('YouTube audio loaded!');
  }catch(e){
    notify('CORS blocked — upload file directly instead');
  }
}

function extractYTId(url){
  const patterns = [
    /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
    /(?:v=)([a-zA-Z0-9_-]{11})/,
    /(?:embed\/)([a-zA-Z0-9_-]{11})/,
  ];
  for(const p of patterns){ const m = url.match(p); if(m) return m[1]; }
  return null;
}

// ── Analysis helpers ──
function getBands(){
  if(!analyser) return {sub:0,bass:0,mid:0,presence:0,high:0,overall:0};
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(waveData);
  const sr = audioCtx.sampleRate, fft = analyser.fftSize;
  const bin = sr/fft;
  function avg(lo,hi){
    const a=Math.round(lo/bin), b=Math.min(Math.round(hi/bin),freqData.length-1);
    if(b<=a) return 0;
    let s=0; for(let i=a;i<=b;i++) s+=freqData[i];
    return s/((b-a+1)*255);
  }
  return {
    sub:avg(20,60),bass:avg(60,250),mid:avg(250,2000),
    presence:avg(2000,6000),high:avg(6000,20000),overall:avg(20,20000)
  };
}

function detectBeat(bands){
  const now = performance.now();
  const e = bands.bass*.65+bands.sub*.35;
  energyHistory.push(e);
  if(energyHistory.length>43) energyHistory.shift();
  const avg = energyHistory.reduce((a,b)=>a+b,0)/energyHistory.length;
  const variance = energyHistory.reduce((a,b)=>a+(b-avg)**2,0)/energyHistory.length;
  const C = 1.35+variance*180;
  if(e>C*avg && now-lastKick>230){
    const delta = now-lastKick;
    if(delta>200&&delta<2000){
      beatHistory.push(delta);
      if(beatHistory.length>8) beatHistory.shift();
      if(beatHistory.length>=4){
        const avg2 = beatHistory.reduce((a,b)=>a+b,0)/beatHistory.length;
        let bpm = Math.round(60000/avg2);
        if(bpm>200) bpm=Math.round(bpm/2);
        if(bpm<60) bpm=bpm*2;
        detectedBpm = bpm;
        bpmSmooth += (bpm-bpmSmooth)*.1;
      }
    }
    lastKick = now;
    return true;
  }
  return false;
}

function detectNote(){
  if(!analyser||!audioCtx) return 'C';
  const bin = audioCtx.sampleRate/analyser.fftSize;
  const lo=Math.round(80/bin), hi=Math.min(Math.round(1000/bin),freqData.length-1);
  let max=0,idx=lo;
  for(let i=lo;i<=hi;i++) if(freqData[i]>max){max=freqData[i];idx=i;}
  const freq=idx*bin;
  if(freq<20) return 'C';
  const midi = Math.round(12*Math.log2(freq/440)+69);
  return NOTES[((midi%12)+12)%12];
}

function classifyMood(bands,bpm){
  for(const m of MOODS){
    const okBpmMin = m.minBpm===undefined||bpm>=m.minBpm;
    const okBpmMax = m.maxBpm===undefined||bpm<=m.maxBpm;
    const okEMin   = m.minE===undefined||bands.overall>=m.minE;
    const okEMax   = m.maxE===undefined||bands.overall<=m.maxE;
    if(okBpmMin&&okBpmMax&&okEMin&&okEMax) return m;
  }
  return MOODS[MOODS.length-1];
}

// ── Particle class ──
class Particle{
  constructor(x,y,hue,spd,sz,life){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*spd;
    this.vy=(Math.random()-.5)*spd-Math.random()*spd*.5;
    this.hue=hue;this.sz=sz;
    this.life=life;this.maxLife=life;
    this.sat=55+Math.random()*35;
  }
  update(){ this.x+=this.vx;this.y+=this.vy;this.vy+=.025;this.vx*=.98;this.life--;this.sz*=.993; }
  draw(){
    const a=this.life/this.maxLife;
    ctx.save();ctx.globalAlpha=a*.85;
    ctx.fillStyle=`hsl(${this.hue},${this.sat}%,70%)`;
    ctx.shadowBlur=this.sz*4;ctx.shadowColor=`hsl(${this.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.sz),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ── Ring pulse ──
class Ring{
  constructor(x,y,hue,speed){
    this.x=x;this.y=y;this.r=0;
    this.maxR=Math.min(canvas.width,canvas.height)*.5;
    this.hue=hue;this.alpha=.7;this.dead=false;
    this.speed=speed||8;
  }
  update(){ this.r+=this.speed;this.alpha=.7*(1-this.r/this.maxR);if(this.r>=this.maxR)this.dead=true; }
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.alpha);
    ctx.strokeStyle=`hsl(${this.hue},75%,65%)`;ctx.lineWidth=1.5;
    ctx.shadowBlur=20;ctx.shadowColor=`hsl(${this.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ════════════════════════════════
//  VISUAL MODES
// ════════════════════════════════

function drawBackground(bands){
  bgHue+=(targetHue-bgHue)*.004;
  const W=canvas.width,H=canvas.height;
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.85);
  g.addColorStop(0,`hsl(${bgHue},22%,${4+bands.overall*7}%)`);
  g.addColorStop(1,`hsl(${bgHue+15},12%,2%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// ── 1. ORBITAL ──
function drawOrbital(bands,isBeat){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  const baseR=Math.min(W,H)*.26+bands.bass*70;
  const spikes=Math.round(5+bands.mid*10);

  [[.28,spikes,t*.5,.55,2],[.16,spikes*2,-t*.75,.32,1.5],[.09,spikes*3,t*1.1,.18,1]].forEach(([amp,freq,phase,op,lw],li)=>{
    const pts=360; ctx.save();
    ctx.globalAlpha=op*(0.3+bands.overall*.7);
    ctx.strokeStyle=`hsl(${colorHue+li*30},72%,65%)`;
    ctx.lineWidth=lw;ctx.shadowBlur=14;ctx.shadowColor=`hsl(${colorHue+li*30},90%,70%)`;
    ctx.beginPath();
    for(let i=0;i<=pts;i++){
      const a=(i/pts)*Math.PI*2;
      const bi=Math.floor((i/pts)*freqData.length/4);
      const fd=freqData?(freqData[bi]/255)*.35:0;
      const r=baseR*(1+Math.sin(a*freq+phase)*amp+fd*bands.bass);
      i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  });

  const gr=40+bands.bass*90+(isBeat?50:0);
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
  grd.addColorStop(0,`hsla(${colorHue},80%,85%,.5)`);
  grd.addColorStop(1,`hsla(${colorHue},80%,60%,0)`);
  ctx.save();ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ── 2. WAVEFORM ──
function drawWaveform(bands){
  const W=canvas.width,H=canvas.height,t=frame/60;
  if(!waveData) return;
  const layers=3;
  for(let l=0;l<layers;l++){
    const offset=H*.5+((l-1)*H*.08);
    const amp=(H*.25)*(1+bands.bass*.8)*(1-l*.2);
    const hue=colorHue+l*25;
    ctx.save();
    ctx.globalAlpha=.7-l*.15;
    ctx.strokeStyle=`hsl(${hue},70%,65%)`;
    ctx.lineWidth=2-l*.4;
    ctx.shadowBlur=12;ctx.shadowColor=`hsl(${hue},90%,70%)`;
    ctx.beginPath();
    for(let i=0;i<waveData.length;i++){
      const x=(i/waveData.length)*W;
      const sample=(waveData[i]/128-1);
      const waveMod=Math.sin(i*.01+t*(1+l*.3))*.15;
      const y=offset+sample*amp*(1+waveMod);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();ctx.restore();
  }

  // center mirror
  ctx.save();
  ctx.globalAlpha=.2;
  ctx.strokeStyle=`hsl(${colorHue},50%,50%)`;
  ctx.lineWidth=.5;
  ctx.setLineDash([4,8]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── 3. SPECTRUM BARS ──
function drawSpectrum(bands){
  const W=canvas.width,H=canvas.height;
  const count=120, barW=W/count*.7, gap=W/count*.3;
  const cx=W/2,cy=H/2;

  for(let i=0;i<count;i++){
    const idx=Math.floor(i/count*freqData.length*.65);
    const val=freqData?freqData[idx]/255:0;
    const barH=val*H*.42;
    const hue=colorHue+(i/count)*80;
    const x=i*(barW+gap)+(W-(count*(barW+gap)))/2;

    // Mirrored bars
    ctx.save();
    ctx.fillStyle=`hsl(${hue},72%,60%)`;
    ctx.shadowBlur=barH*.2;ctx.shadowColor=`hsl(${hue},90%,70%)`;
    ctx.globalAlpha=0.8;
    // top
    ctx.fillRect(x,cy-barH,barW,barH);
    // bottom mirror
    ctx.globalAlpha=0.35;
    ctx.fillRect(x,cy,barW,barH);
    ctx.restore();

    // top cap
    if(val>.05){
      ctx.save();
      ctx.globalAlpha=.9;
      ctx.fillStyle=`hsl(${hue},90%,80%)`;
      ctx.fillRect(x,cy-barH-2,barW,2);
      ctx.restore();
    }
  }
}

// ── 4. KALEIDOSCOPE ──
function drawKaleidoscope(bands,isBeat){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  const segments=8;
  const sliceAngle=(Math.PI*2)/segments;
  const r=Math.min(W,H)*.5;

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.clip();

  for(let s=0;s<segments;s++){
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(s*sliceAngle);
    if(s%2===0) ctx.scale(1,-1);

    // draw layered arcs driven by freq
    const bars=40;
    for(let i=0;i<bars;i++){
      const idx=Math.floor(i/bars*freqData.length*.4);
      const val=freqData?freqData[idx]/255:0;
      const ri=(i/bars)*r*.9;
      const arc=sliceAngle*(0.5+val*.6);
      const hue=colorHue+(i/bars)*120+t*10;

      ctx.save();
      ctx.globalAlpha=val*.6;
      ctx.strokeStyle=`hsl(${hue},75%,65%)`;
      ctx.lineWidth=r/bars*.8;
      ctx.shadowBlur=8;ctx.shadowColor=`hsl(${hue},90%,70%)`;
      ctx.beginPath();
      ctx.arc(0,0,ri,-sliceAngle/2,-sliceAngle/2+arc);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }
  ctx.restore();

  // center dot
  const gr=15+bands.bass*40;
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
  grd.addColorStop(0,`hsla(${colorHue},90%,90%,.8)`);
  grd.addColorStop(1,`hsla(${colorHue},80%,60%,0)`);
  ctx.save();ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,gr,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ── 5. TUNNEL ──
let tunnelDepth=0;
function drawTunnel(bands,isBeat){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  tunnelDepth+=.015*(1+bands.bass);
  const layers=20;

  for(let i=layers;i>=0;i--){
    const phase=(i/layers+tunnelDepth)%1;
    const sz=phase*Math.min(W,H)*.7;
    const alpha=(1-phase)*.6*(bands.overall*.5+.5);
    const hue=colorHue+(phase*60)+t*5;
    const sides=Math.round(4+bands.mid*6);
    const twist=phase*Math.PI*.5+t*.3;
    const warp=1+Math.sin(t*2+i)*bands.bass*.3;

    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle=`hsl(${hue},72%,65%)`;
    ctx.lineWidth=1.5;
    ctx.shadowBlur=20;ctx.shadowColor=`hsl(${hue},90%,70%)`;
    ctx.beginPath();
    for(let j=0;j<=sides;j++){
      const a=(j/sides)*Math.PI*2+twist;
      const px=cx+Math.cos(a)*sz*.5*warp;
      const py=cy+Math.sin(a)*sz*.5/warp;
      j===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  }
}

// ── 6. PARTICLE FIELD ──
let fieldParticles=[];
function initFieldParticles(){
  fieldParticles=[];
  for(let i=0;i<150;i++){
    fieldParticles.push({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height,
      vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,
      size:Math.random()*2+.5,hue:Math.random()*360,alpha:Math.random()*.5+.2
    });
  }
}
function drawParticleField(bands,isBeat){
  const W=canvas.width,H=canvas.height,t=frame/60;
  fieldParticles.forEach(p=>{
    // Flow field based on freq
    const gx=Math.floor(p.x/W*8),gy=Math.floor(p.y/H*8);
    const bi=Math.min(gx*8+gy,freqData?freqData.length-1:0);
    const force=(freqData?freqData[bi]/255:0)*.5;
    const angle=Math.sin(p.x*.005+t)+Math.cos(p.y*.005+t);
    p.vx+=Math.cos(angle)*force*.3;
    p.vy+=Math.sin(angle)*force*.3+bands.bass*.05;
    p.vx*=.97;p.vy*=.97;
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    p.hue=(colorHue+(p.x/W)*60)%360;

    ctx.save();
    ctx.globalAlpha=p.alpha*(0.4+bands.overall*.6);
    ctx.fillStyle=`hsl(${p.hue},70%,70%)`;
    ctx.shadowBlur=p.size*3;ctx.shadowColor=`hsl(${p.hue},90%,70%)`;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1+bands.bass*.5),0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // Connect nearby particles
  ctx.save();ctx.lineWidth=.3;
  for(let i=0;i<fieldParticles.length;i+=3){
    for(let j=i+1;j<fieldParticles.length;j+=3){
      const dx=fieldParticles[i].x-fieldParticles[j].x;
      const dy=fieldParticles[i].y-fieldParticles[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){
        ctx.globalAlpha=(.8-d/80)*.12*bands.overall;
        ctx.strokeStyle=`hsl(${colorHue},60%,65%)`;
        ctx.beginPath();
        ctx.moveTo(fieldParticles[i].x,fieldParticles[i].y);
        ctx.lineTo(fieldParticles[j].x,fieldParticles[j].y);
        ctx.stroke();
      }
    }
  }
  ctx.restore();
}

// ── Freq bars (bottom overlay) ──
function drawFreqOverlay(){
  if(!freqData) return;
  const W=freqCanvas.width,H=freqCanvas.height,count=96,barW=W/count;
  fCtx.clearRect(0,0,W,H);
  for(let i=0;i<count;i++){
    const idx=Math.floor(i/count*freqData.length*.5);
    const val=freqData[idx]/255;
    const bh=val*H*.85;
    const hue=colorHue+(i/count)*50;
    fCtx.fillStyle=`hsla(${hue},68%,62%,${.25+val*.45})`;
    fCtx.fillRect(i*barW,H-bh,barW-1,bh);
  }
}

// ═════════════════ MAIN LOOP ═════════════════
function loop(){
  requestAnimationFrame(loop);
  frame++;
  const bands=getBands();
  const isBeat=detectBeat(bands);

  // Note + mood + color
  if(!manualKey) dominantNote=detectNote();
  const note=manualKey||dominantNote;
  const mood=classifyMood(bands,manualBpm||bpmSmooth);
  moodLabel=mood.label;
  targetHue=(mood.hue*.55+(NOTE_HUE[note]||0)*.45);
  colorHue+=(targetHue-colorHue)*.018;

  // Background
  drawBackground(bands);

  // Beat events
  if(isBeat && playing){
    $('beat-ring').style.opacity='1';
    $('beat-ring').style.boxShadow=`inset 0 0 150px hsla(${colorHue},80%,70%,.07)`;
    setTimeout(()=>{ $('beat-ring').style.opacity='0'; },90);
    rings.push(new Ring(canvas.width/2,canvas.height/2,colorHue));
    const n=Math.floor(6+bands.bass*18);
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, d=Math.random()*180;
      particles.push(new Particle(
        canvas.width/2+Math.cos(a)*d, canvas.height/2+Math.sin(a)*d,
        colorHue+(Math.random()-.5)*50, 3+bands.bass*7, 1+Math.random()*3, 45+Math.random()*55
      ));
    }
  }

  // Ambient particles
  if(playing && Math.random()<bands.high*.25+.015 && particles.length<400){
    particles.push(new Particle(
      Math.random()*canvas.width, canvas.height+5,
      colorHue+(Math.random()-.5)*40, 1.5+Math.random()*2, .5+Math.random()*1.5, 90+Math.random()*120
    ));
  }

  // Mode draw
  if(playing){
    switch(visualMode){
      case 'orbital':       drawOrbital(bands,isBeat); break;
      case 'waveform':      drawWaveform(bands); break;
      case 'tunnel':        drawTunnel(bands,isBeat); break;
      case 'particles':     drawParticleField(bands,isBeat); break;
    }
  }

  rings.forEach(r=>{r.update();r.draw();}); rings=rings.filter(r=>!r.dead);
  particles.forEach(p=>{p.update();p.draw();}); particles=particles.filter(p=>p.life>0);
  drawFreqOverlay();

  // HUD updates
  if(playing){
    $('bpm-val').textContent=Math.round(manualBpm||bpmSmooth)||'—';
    $('key-val').textContent=(manualKey||dominantNote)+(keyMode==='Minor'?' m':'');
    $('energy-val').textContent=Math.round(bands.overall*100)+'%';
    $('mood-pill').textContent=moodLabel;
    if(audio.duration) $('progress-fill').style.width=(audio.currentTime/audio.duration*100)+'%';
  }
}
loop();
initFieldParticles();

// ── TAP BPM ──
let tapTimes=[], tapBpm=0;
$('btn-tap').addEventListener('click',()=>{ $('tap-overlay').classList.add('open'); tapTimes=[]; $('tap-bpm-display').textContent='—'; });
$('tap-btn').addEventListener('click',()=>{
  const now=performance.now();
  tapTimes.push(now);
  if(tapTimes.length>1){
    const deltas=tapTimes.slice(1).map((t,i)=>t-tapTimes[i]);
    const avg=deltas.reduce((a,b)=>a+b,0)/deltas.length;
    tapBpm=Math.round(60000/avg);
    $('tap-bpm-display').textContent=tapBpm;
  }
  if(tapTimes.length>8) tapTimes.shift();
});
$('tap-reset').addEventListener('click',()=>{ tapTimes=[]; tapBpm=0; $('tap-bpm-display').textContent='—'; });
$('tap-confirm').addEventListener('click',()=>{
  if(tapBpm){
    manualBpm=tapBpm;bpmSmooth=tapBpm;
    notify(`BPM set to ${tapBpm}`);
  }
  $('tap-overlay').classList.remove('open');
});
$('tap-cancel').addEventListener('click',()=>$('tap-overlay').classList.remove('open'));

// ── KEY OVERRIDE ──

const grid=$('key-grid');
NOTES_LIST.forEach(n=>{
  const el=document.createElement('div');
  el.className='key-chip'; el.textContent=n;
  el.addEventListener('click',()=>{

  selectedKey=manualKey;
  selectedKeyMode=keyMode;
  document.querySelectorAll('.key-chip').forEach(c=>c.classList.remove('selected'));

    [...document.querySelectorAll('.key-chip')].find(c=>c.textContent===selectedKey)?.classList.add('selected');
  }
  updateKeyModeUI();
  $('key-overlay').classList.add('open');
});
$('mode-major').addEventListener('click',()=>{ selectedKeyMode='Major'; updateKeyModeUI(); });
$('mode-minor').addEventListener('click',()=>{ selectedKeyMode='Minor'; updateKeyModeUI(); });

  $('mode-minor').classList.toggle('active',selectedKeyMode==='Minor');
}
$('key-overlay').addEventListener('click',e=>{
  if(e.target===$('key-overlay')||e.target.id==='key-cancel'){
    if(selectedKey){
      manualKey=selectedKey; keyMode=selectedKeyMode;
      notify(`Key set to ${selectedKey} ${selectedKeyMode}`);

    $('key-overlay').classList.remove('open');

});

// ── Notify ──
let notifTimer;
function notify(msg){
  const el=$('notif');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){ e.preventDefault(); if(audio.src){playing?audio.pause():audio.play();} }
  if(e.key==='m'||e.key==='M'){
    const modes=['orbital','waveform','tunnel','particles'];
    const i=(modes.indexOf(visualMode)+1)%modes.length;
    visualMode=modes[i];
    document.querySelectorAll('.mode-btn').forEach(b=>{b.classList.toggle('active',b.dataset.mode===visualMode);});
    if(visualMode==='particles') initFieldParticles();
    notify('Mode: '+visualMode);
  }
});
