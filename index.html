<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synesthétique — Music Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#07070d;}
html,body{width:100%;height:100%;background:var(--bg);color:#fff;font-family:'Space Mono',monospace;overflow:hidden;user-select:none;}

#canvas{position:fixed;inset:0;width:100%;height:100%;}
#freq-canvas{position:fixed;bottom:0;left:0;width:100%;height:100px;z-index:5;pointer-events:none;}

/* LANDING BG */
#landing-bg{position:fixed;inset:0;z-index:48;transition:opacity .85s,visibility .85s;}
#landing-bg.gone{opacity:0;visibility:hidden;}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* LANDING */
#landing{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px;transition:opacity .85s,visibility .85s;}
#landing.gone{opacity:0;visibility:hidden;pointer-events:none;}
.brand{text-align:center;}
.brand-name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(58px,8vw,112px);letter-spacing:.1em;color:#fff;line-height:1;text-shadow:0 0 120px rgba(160,140,220,.22);}
.brand-tag{font-size:11px;letter-spacing:.55em;color:rgba(255,255,255,.35);margin-top:14px;text-transform:uppercase;}
.dropbox{width:min(460px,88vw);border:1px solid rgba(255,255,255,.1);padding:54px 40px;display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;position:relative;transition:border-color .3s,background .3s;}
.dropbox::before,.dropbox::after{content:'';position:absolute;width:22px;height:22px;border-color:rgba(200,180,140,.45);border-style:solid;transition:width .3s,height .3s;}
.dropbox::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.dropbox::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.dropbox:hover::before,.dropbox:hover::after,.dropbox.drag-over::before,.dropbox.drag-over::after{width:34px;height:34px;}
.dropbox:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.02);}
.dropbox.drag-over{border-color:rgba(200,180,140,.5);background:rgba(200,180,140,.04);}
.drop-icon{width:36px;height:36px;opacity:.25;margin-bottom:6px;}
.dropbox-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-style:italic;color:#fff;}
.dropbox-sub{font-size:10px;letter-spacing:.28em;color:rgba(255,255,255,.3);text-transform:uppercase;}
.dropbox-formats{font-size:9px;letter-spacing:.1em;color:rgba(255,255,255,.14);margin-top:2px;}
input[type=file]{display:none;}

/* HUD */
#hud{position:fixed;inset:0;z-index:20;pointer-events:none;opacity:0;transition:opacity .85s;}
#hud.visible{opacity:1;}

#topbar{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:24px 34px;background:linear-gradient(to bottom,rgba(7,7,13,.88) 0%,transparent 100%);}
.logo-sm{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;letter-spacing:.18em;color:rgba(255,255,255,.5);cursor:pointer;pointer-events:all;transition:color .25s;}
.logo-sm:hover{color:#fff;}
#stats{display:flex;gap:30px;}
.stat{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
.stat-val{font-size:20px;font-weight:700;color:#fff;}
.stat-lbl{font-size:8px;letter-spacing:.35em;color:rgba(255,255,255,.25);text-transform:uppercase;}

/* MODE BAR */
#mode-bar{position:absolute;top:50%;right:26px;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;pointer-events:all;}
.mode-btn{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.28);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.22em;padding:9px 12px;cursor:pointer;text-transform:uppercase;transition:all .2s;white-space:nowrap;text-align:center;min-width:82px;}
.mode-btn:hover{color:rgba(255,255,255,.75);border-color:rgba(255,255,255,.18);}
.mode-btn.active{color:#fff;border-color:rgba(255,255,255,.42);background:rgba(255,255,255,.07);}
/* AUTO button distinct style */
.mode-btn.auto-btn{border-color:rgba(255,200,100,.2);color:rgba(255,200,100,.4);}
.mode-btn.auto-btn:hover{color:rgba(255,200,100,.9);border-color:rgba(255,200,100,.4);}
.mode-btn.auto-btn.active{color:#ffc864;border-color:rgba(255,200,100,.7);background:rgba(255,200,100,.07);}
.mode-divider{height:1px;background:rgba(255,255,255,.07);margin:2px 0;}

/* BOTTOM */
#bottombar{position:absolute;bottom:0;left:0;right:0;padding:18px 34px 28px;background:linear-gradient(to top,rgba(7,7,13,.92) 0%,transparent 100%);display:flex;flex-direction:column;gap:14px;}
#progress-wrap{width:100%;height:2px;background:rgba(255,255,255,.08);cursor:pointer;pointer-events:all;position:relative;transition:height .15s;}
#progress-wrap:hover{height:3px;}
#progress-fill{height:100%;background:rgba(255,255,255,.6);width:0%;pointer-events:none;}
#progress-head{position:absolute;right:0;top:50%;transform:translate(50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;pointer-events:none;opacity:0;transition:opacity .15s;}
#progress-wrap:hover #progress-head{opacity:1;}
.bottom-row{display:flex;align-items:center;justify-content:space-between;gap:16px;}
#track-info{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1;}
#track-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#track-sub{font-size:8px;letter-spacing:.3em;color:rgba(255,255,255,.22);text-transform:uppercase;}
#controls{display:flex;align-items:center;gap:14px;pointer-events:all;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.48);transition:color .2s;padding:4px;display:flex;align-items:center;}
.icon-btn:hover{color:#fff;}
.icon-btn svg{width:22px;height:22px;fill:currentColor;}
#vol-slider{-webkit-appearance:none;width:72px;height:2px;background:rgba(255,255,255,.14);outline:none;cursor:pointer;}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:#fff;border-radius:50%;}
.right-controls{display:flex;align-items:center;gap:12px;pointer-events:all;flex-shrink:0;}
#mood-pill{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.07);padding:5px 14px;}
.btn-sm{background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.55);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.25em;padding:9px 18px;cursor:pointer;text-transform:uppercase;transition:all .25s;white-space:nowrap;}
.btn-sm:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.28);color:#fff;}

/* AUTO mode indicator in bottom */
#auto-indicator{font-size:8px;letter-spacing:.25em;color:rgba(255,200,100,.5);text-transform:uppercase;display:none;}
#auto-indicator.visible{display:block;}

#notif{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:rgba(12,12,20,.97);border:1px solid rgba(255,255,255,.1);font-size:9px;letter-spacing:.22em;color:rgba(255,255,255,.62);padding:10px 24px;z-index:80;opacity:0;transition:opacity .3s;pointer-events:none;text-transform:uppercase;white-space:nowrap;}
#notif.show{opacity:1;}
#beat-ring{position:fixed;inset:0;pointer-events:none;z-index:4;opacity:0;transition:opacity .05s;}
</style>
</head>
<body>
<div id="beat-ring"></div>
<canvas id="canvas"></canvas>
<canvas id="freq-canvas"></canvas>
<div id="landing-bg"><canvas id="bg-canvas"></canvas></div>

<div id="landing">
  <div class="brand">
    <div class="brand-name">Synesthétique</div>
    <div class="brand-tag">music visualizer</div>
  </div>
  <div class="dropbox" id="dropbox">
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
    </svg>
    <div class="dropbox-title">drop a track here</div>
    <div class="dropbox-sub">or click to browse</div>
    <div class="dropbox-formats">mp3 · wav · ogg · flac · aac · m4a</div>
    <input type="file" id="file-input" accept="audio/*">
  </div>
</div>

<div id="hud">
  <div id="topbar">
    <div class="logo-sm" id="logo-sm-btn">Synesthétique</div>
    <div id="stats">
      <div class="stat"><div class="stat-val" id="bpm-val">—</div><div class="stat-lbl">BPM</div></div>
      <div class="stat"><div class="stat-val" id="key-val">—</div><div class="stat-lbl">KEY</div></div>
      <div class="stat"><div class="stat-val" id="energy-val">—</div><div class="stat-lbl">ENERGY</div></div>
    </div>
  </div>

  <div id="mode-bar">
    <button class="mode-btn auto-btn" data-mode="auto">AUTO</button>
    <div class="mode-divider"></div>
    <button class="mode-btn active" data-mode="orbital">Orbital</button>
    <button class="mode-btn" data-mode="waveform">Waveform</button>
    <button class="mode-btn" data-mode="tunnel">Tunnel</button>
    <button class="mode-btn" data-mode="particles">Particles</button>
  </div>

  <div id="bottombar">
    <div id="progress-wrap">
      <div id="progress-fill"></div>
      <div id="progress-head"></div>
    </div>
    <div class="bottom-row">
      <div id="track-info">
        <div id="track-name">—</div>
        <div id="track-sub">now playing · <span id="auto-indicator">auto</span></div>
      </div>
      <div id="controls">
        <button class="icon-btn" id="btn-play">
          <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.8">
      </div>
      <div class="right-controls">
        <div id="mood-pill">—</div>
        <button class="btn-sm" id="btn-new">+ Track</button>
      </div>
    </div>
  </div>
</div>

<div id="notif"></div>
<input type="file" id="file-input-hidden" accept="audio/*" style="display:none">
<audio id="audio" crossorigin="anonymous"></audio>

<script>
// ════════════════════════════════════════════
//  Synesthétique — Music Visualizer
//  Full spectrum colors · New tunnel · AUTO mode
// ════════════════════════════════════════════

const $ = id => document.getElementById(id);
const canvas    = $('canvas'),     ctx  = canvas.getContext('2d');
const freqCanvas= $('freq-canvas'),fCtx = freqCanvas.getContext('2d');
const bgCanvas  = $('bg-canvas'),  bgCtx= bgCanvas.getContext('2d');
const audio = $('audio');

function resize(){
  canvas.width = freqCanvas.width = bgCanvas.width = innerWidth;
  canvas.height = innerHeight; freqCanvas.height = 100; bgCanvas.height = innerHeight;
}
resize(); window.addEventListener('resize', resize);

// ── State ──
let audioCtx, analyser, gainNode, srcNode, freqData, waveData;
let playing=false, frame=0;
let visualMode='orbital', autoMode=false;
let colorHue=0, targetHue=0, bgHue=0;
let colorSat=85, targetSat=85;           // saturation also shifts
let bpmSmooth=120, detectedBpm=120;
let dominantNote='C', moodLabel='ambient';
let energyHistory=[], beatHistory=[], lastKick=0;
let particles=[], rings=[], landingVisible=true;

// ── AUTO mode state ──
let autoCurrentMode='particles';
let autoCandidateMode='particles';
let autoCandidateTime=0;
const AUTO_HOLD_MS = 4500; // must sustain mood for this long before switching

// ── Crossfade between modes ──
let xfadeFrom='particles', xfadeTo='particles', xfadeAlpha=1.0;
const XFADE_SPEED = 0.018; // alpha per frame

// ── Color palette — full spectrum ──
// Mood → hue spread across FULL 360°, vivid saturations
const MOODS = [
  {label:'euphoric',   minBpm:148,minE:.42, hue:320, sat:95}, // hot pink / magenta
  {label:'energetic',  minBpm:128,minE:.36, hue:15,  sat:92}, // fiery orange-red
  {label:'driving',    minBpm:108,minE:.28, hue:50,  sat:90}, // golden amber
  {label:'groovy',     minBpm:88, minE:.20, hue:100, sat:88}, // lime green
  {label:'dreamy',     maxBpm:94, maxE:.27, hue:260, sat:80}, // violet
  {label:'melancholic',maxBpm:80, maxE:.19, hue:210, sat:75}, // sky blue
  {label:'ambient',    minBpm:0,  minE:0,   hue:185, sat:70}, // teal
];

// Mood → AUTO mode assignment
const MOOD_TO_MODE = {
  euphoric:   'tunnel',
  energetic:  'tunnel',
  driving:    'orbital',
  groovy:     'waveform',
  dreamy:     'particles',
  melancholic:'waveform',
  ambient:    'particles',
};

const NOTES    = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Notes spread across full hue wheel
const NOTE_HUE = {C:0,'C#':30,D:60,'D#':90,E:120,F:150,'F#':180,G:200,'G#':240,A:270,'A#':300,B:340};

// ── Landing background ──
const orbs=[
  {x:.2, y:.3, vx:.00018,vy:.00012,hue:280,sz:.38},
  {x:.75,y:.22,vx:-.00015,vy:.00020,hue:20, sz:.32},
  {x:.5, y:.72,vx:.00010,vy:-.00018,hue:160,sz:.42},
  {x:.84,y:.64,vx:-.00020,vy:-.00012,hue:60,sz:.30},
  {x:.15,y:.75,vx:.00022,vy:.00008,hue:330,sz:.35},
];
let bgFrame=0;
(function animateBg(){
  requestAnimationFrame(animateBg); bgFrame++;
  if(!landingVisible) return;
  const W=bgCanvas.width,H=bgCanvas.height;
  bgCtx.fillStyle='#07070d'; bgCtx.fillRect(0,0,W,H);
  orbs.forEach(o=>{
    o.x+=o.vx+Math.sin(bgFrame*.009+o.hue*.01)*.00008;
    o.y+=o.vy+Math.cos(bgFrame*.007+o.hue*.01)*.00008;
    if(o.x<-.15)o.x=1.15;if(o.x>1.15)o.x=-.15;
    if(o.y<-.15)o.y=1.15;if(o.y>1.15)o.y=-.15;
    const r=o.sz*Math.min(W,H)*(1+Math.sin(bgFrame*.013+o.hue*.01)*.06);
    const g=bgCtx.createRadialGradient(o.x*W,o.y*H,0,o.x*W,o.y*H,r);
    g.addColorStop(0, `hsla(${o.hue},55%,32%,.18)`);
    g.addColorStop(.5,`hsla(${o.hue},50%,22%,.07)`);
    g.addColorStop(1, `hsla(${o.hue},40%,14%,0)`);
    bgCtx.fillStyle=g; bgCtx.fillRect(0,0,W,H);
  });
  const vg=bgCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.72);
  vg.addColorStop(0,'transparent'); vg.addColorStop(1,'rgba(4,4,10,.78)');
  bgCtx.fillStyle=vg; bgCtx.fillRect(0,0,W,H);
})();

// ── Audio ──
function setupAudio(src){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=2048; analyser.smoothingTimeConstant=0.8;
    gainNode=audioCtx.createGain(); gainNode.gain.value=+($('vol-slider').value);
    srcNode=audioCtx.createMediaElementSource(audio);
    srcNode.connect(analyser); analyser.connect(gainNode); gainNode.connect(audioCtx.destination);
    freqData=new Uint8Array(analyser.frequencyBinCount);
    waveData=new Uint8Array(analyser.frequencyBinCount);
  }
  if(audioCtx.state==='suspended') audioCtx.resume();
  audio.src=src; audio.play(); playing=true;
  $('hud').classList.add('visible');
  $('landing').classList.add('gone');
  $('landing-bg').classList.add('gone');
  landingVisible=false;
  particles=[]; rings=[]; energyHistory=[]; beatHistory=[]; lastKick=0;
}
function loadFile(file){
  setupAudio(URL.createObjectURL(file));
  $('track-name').textContent=file.name.replace(/\.[^.]+$/,'');
}

// ── Analysis ──
function getBands(){
  if(!analyser) return{sub:0,bass:0,mid:0,presence:0,high:0,overall:0};
  analyser.getByteFrequencyData(freqData);
  analyser.getByteTimeDomainData(waveData);
  const bin=audioCtx.sampleRate/analyser.fftSize;
  function avg(lo,hi){
    const a=Math.round(lo/bin),b=Math.min(Math.round(hi/bin),freqData.length-1);
    if(b<=a)return 0; let s=0; for(let i=a;i<=b;i++)s+=freqData[i];
    return s/((b-a+1)*255);
  }
  return{sub:avg(20,60),bass:avg(60,250),mid:avg(250,2000),
         presence:avg(2000,6000),high:avg(6000,20000),overall:avg(20,20000)};
}

function detectBeat(bands){
  const now=performance.now(),e=bands.bass*.65+bands.sub*.35;
  energyHistory.push(e); if(energyHistory.length>43) energyHistory.shift();
  const avg=energyHistory.reduce((a,b)=>a+b,0)/energyHistory.length;
  const variance=energyHistory.reduce((a,b)=>a+(b-avg)**2,0)/energyHistory.length;
  if(e>(1.35+variance*180)*avg&&now-lastKick>230){
    const delta=now-lastKick;
    if(delta>200&&delta<2000){
      beatHistory.push(delta); if(beatHistory.length>8) beatHistory.shift();
      if(beatHistory.length>=4){
        let b=Math.round(60000/(beatHistory.reduce((a,b)=>a+b,0)/beatHistory.length));
        if(b>200)b=Math.round(b/2); if(b<60)b*=2;
        detectedBpm=b; bpmSmooth+=(b-bpmSmooth)*.1;
      }
    }
    lastKick=now; return true;
  }
  return false;
}

function detectNote(){
  if(!analyser||!audioCtx) return 'C';
  const bin=audioCtx.sampleRate/analyser.fftSize;
  const lo=Math.round(80/bin),hi=Math.min(Math.round(1000/bin),freqData.length-1);
  let max=0,idx=lo; for(let i=lo;i<=hi;i++) if(freqData[i]>max){max=freqData[i];idx=i;}
  const freq=idx*bin; if(freq<20) return 'C';
  return NOTES[((Math.round(12*Math.log2(freq/440)+69)%12)+12)%12];
}

function classifyMood(bands,bpm){
  for(const m of MOODS)
    if((m.minBpm===undefined||bpm>=m.minBpm)&&(m.maxBpm===undefined||bpm<=m.maxBpm)&&
       (m.minE===undefined||bands.overall>=m.minE)&&(m.maxE===undefined||bands.overall<=m.maxE)) return m;
  return MOODS[MOODS.length-1];
}

// ── AUTO mode logic ──
function updateAutoMode(moodLabel){
  if(!autoMode) return;
  const candidate = MOOD_TO_MODE[moodLabel] || 'particles';
  const now = performance.now();
  if(candidate !== autoCandidateMode){
    autoCandidateMode = candidate;
    autoCandidateTime = now;
  }
  if(candidate !== autoCurrentMode && now - autoCandidateTime > AUTO_HOLD_MS){
    // Trigger crossfade to new mode
    beginCrossfade(autoCurrentMode, candidate);
    autoCurrentMode = candidate;
  }
}

function beginCrossfade(from, to){
  if(from===to) return;
  xfadeFrom=from; xfadeTo=to; xfadeAlpha=0;
}

// ── Particle / Ring classes ──
class Particle{
  constructor(x,y,hue,spd,sz,life){
    this.x=x;this.y=y;
    this.vx=(Math.random()-.5)*spd;this.vy=(Math.random()-.5)*spd-Math.random()*spd*.5;
    this.hue=hue;this.sz=sz;this.life=life;this.maxLife=life;this.sat=70+Math.random()*25;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.025;this.vx*=.98;this.life--;this.sz*=.993;}
  draw(){
    ctx.save();ctx.globalAlpha=(this.life/this.maxLife)*.9;
    ctx.fillStyle=`hsl(${this.hue},${this.sat}%,68%)`;
    ctx.shadowBlur=this.sz*5;ctx.shadowColor=`hsl(${this.hue},100%,70%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,Math.max(.1,this.sz),0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}
class Ring{
  constructor(x,y,hue){
    this.x=x;this.y=y;this.r=0;
    this.maxR=Math.min(canvas.width,canvas.height)*.55;
    this.hue=hue;this.alpha=.7;this.dead=false;this.speed=9+Math.random()*5;
  }
  update(){this.r+=this.speed;this.alpha=.7*(1-this.r/this.maxR);if(this.r>=this.maxR)this.dead=true;}
  draw(){
    ctx.save();ctx.globalAlpha=Math.max(0,this.alpha);
    ctx.strokeStyle=`hsl(${this.hue},90%,68%)`;ctx.lineWidth=1.5;
    ctx.shadowBlur=22;ctx.shadowColor=`hsl(${this.hue},100%,72%)`;
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
}

// ════════════════════════════════
//  VISUAL MODES — full spectrum, vibrant
// ════════════════════════════════

function drawBackground(bands){
  bgHue+=(targetHue-bgHue)*.006;
  const W=canvas.width,H=canvas.height;
  const g=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.85);
  g.addColorStop(0,`hsl(${bgHue},28%,${6+bands.overall*10}%)`);
  g.addColorStop(.6,`hsl(${bgHue+30},18%,4%)`);
  g.addColorStop(1,`hsl(${bgHue+50},10%,2%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

// Helper: get a vivid hue offset from base
function h(offset){ return (colorHue+offset+360)%360; }

// ── ORBITAL ──
function drawOrbital(bands,isBeat,alpha=1){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  const baseR=Math.min(W,H)*.26+bands.bass*75;
  const spikes=Math.round(5+bands.mid*10);
  ctx.save(); ctx.globalAlpha=alpha;

  // 3 frequency-reactive rings, each a different vivid hue
  [
    [.30,spikes,    t*.50, .60, 2.0, 0  ],
    [.18,spikes*2, -t*.75, .38, 1.5, 120],
    [.10,spikes*3,  t*1.1, .22, 1.0, 240],
  ].forEach(([amp,freq,phase,op,lw,hoff])=>{
    const hue=h(hoff);
    ctx.save(); ctx.globalAlpha=alpha*op*(0.35+bands.overall*.65);
    ctx.strokeStyle=`hsl(${hue},90%,65%)`;
    ctx.lineWidth=lw; ctx.shadowBlur=18; ctx.shadowColor=`hsl(${hue},100%,68%)`;
    ctx.beginPath();
    for(let i=0;i<=360;i++){
      const a=(i/360)*Math.PI*2;
      const bi=Math.floor((i/360)*freqData.length/4);
      const fd=freqData?(freqData[bi]/255)*.4:0;
      const r=baseR*(1+Math.sin(a*freq+phase)*amp+fd*bands.bass);
      i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r)
           :ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    ctx.closePath(); ctx.stroke(); ctx.restore();
  });

  // central bloom — complementary color
  const gr=45+bands.bass*100+(isBeat?60:0);
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,gr);
  grd.addColorStop(0,`hsla(${h(180)},95%,85%,.55)`);
  grd.addColorStop(.5,`hsla(${colorHue},90%,65%,.2)`);
  grd.addColorStop(1,`hsla(${colorHue},80%,50%,0)`);
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=grd;
  ctx.beginPath(); ctx.arc(cx,cy,gr,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.restore();
}

// ── WAVEFORM ──
function drawWaveform(bands,alpha=1){
  const W=canvas.width,H=canvas.height,t=frame/60;
  if(!waveData) return;
  ctx.save(); ctx.globalAlpha=alpha;

  // 4 layers, spread across hue wheel
  const hues=[colorHue, h(90), h(180), h(270)];
  const ops=[.75,.55,.38,.22];
  const amps=[1,.8,.6,.4];

  hues.forEach((hue,l)=>{
    const offset=H*.5+((l-1.5)*H*.06);
    const amp=(H*.22)*(1+bands.bass*.9)*amps[l];
    ctx.save(); ctx.globalAlpha=alpha*ops[l];
    ctx.strokeStyle=`hsl(${hue},88%,65%)`;
    ctx.lineWidth=2.5-l*.4;
    ctx.shadowBlur=14; ctx.shadowColor=`hsl(${hue},100%,68%)`;
    ctx.beginPath();
    for(let i=0;i<waveData.length;i++){
      const x=(i/waveData.length)*W;
      const wm=Math.sin(i*.008+t*(1+l*.4)+hue*.01)*.18;
      const y=offset+(waveData[i]/128-1)*amp*(1+wm);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke(); ctx.restore();
  });

  // center line
  ctx.save(); ctx.globalAlpha=alpha*.1; ctx.strokeStyle='rgba(255,255,255,.5)';
  ctx.lineWidth=.5; ctx.setLineDash([4,12]);
  ctx.beginPath(); ctx.moveTo(0,H/2); ctx.lineTo(W,H/2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.restore();
}

// ── TUNNEL — fully rebuilt: exploding neon vortex ──
let tunnelAngle=0;
function drawTunnel(bands,isBeat,alpha=1){
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,t=frame/60;
  const speed=.008+bands.bass*.025+(isBeat?.04:0);
  tunnelAngle+=speed;
  ctx.save(); ctx.globalAlpha=alpha;

  const layers=28;
  for(let i=0;i<layers;i++){
    const depth=i/layers;
    const sz=(1-depth)*Math.min(W,H)*.52;
    const bi=Math.floor(depth*freqData.length*.4);
    const freqVal=freqData?freqData[bi]/255:0;
    const energyPulse=1+freqVal*bands.bass*.6+(isBeat&&i<6?.35:0);

    // Each layer gets its own hue — full color wheel rotation
    const hue=(colorHue+depth*180+tunnelAngle*30)%360;
    const compHue=(hue+120)%360;
    const sat=85+freqVal*15;
    const lit=50+freqVal*20;
    const lineW=1.2+freqVal*2.5;
    const sides=Math.round(3+bands.mid*5+depth*3)%8+3; // 3-10 sides
    const twist=tunnelAngle*(1+depth*1.5)+depth*Math.PI*.4;
    const wobble=1+Math.sin(t*3+depth*8)*bands.bass*.2;

    // outer glow ring
    ctx.save();
    ctx.globalAlpha=alpha*(1-depth)*.7;
    ctx.strokeStyle=`hsl(${hue},${sat}%,${lit}%)`;
    ctx.lineWidth=lineW;
    ctx.shadowBlur=20+freqVal*30;
    ctx.shadowColor=`hsl(${compHue},100%,72%)`;
    ctx.beginPath();
    for(let j=0;j<=sides;j++){
      const a=(j/sides)*Math.PI*2+twist;
      const rx=sz*.5*wobble*energyPulse;
      const ry=sz*.5/wobble*energyPulse;
      j===0?ctx.moveTo(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry)
           :ctx.lineTo(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);
    }
    ctx.closePath(); ctx.stroke(); ctx.restore();

    // spokes on inner layers for depth
    if(i<8&&freqVal>.3){
      ctx.save();
      ctx.globalAlpha=alpha*(1-depth)*.25*freqVal;
      ctx.strokeStyle=`hsl(${compHue},100%,75%)`;
      ctx.lineWidth=.8;
      for(let s=0;s<sides;s++){
        const a=(s/sides)*Math.PI*2+twist;
        ctx.beginPath();
        ctx.moveTo(cx,cy);
        ctx.lineTo(cx+Math.cos(a)*sz*.5*energyPulse,cy+Math.sin(a)*sz*.5*energyPulse);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Beat shockwave
  if(isBeat){
    const shockR=Math.min(W,H)*.08;
    const sg=ctx.createRadialGradient(cx,cy,0,cx,cy,shockR);
    sg.addColorStop(0,`hsla(${h(180)},100%,90%,.8)`);
    sg.addColorStop(.4,`hsla(${colorHue},100%,70%,.3)`);
    sg.addColorStop(1,`hsla(${colorHue},90%,50%,0)`);
    ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=sg;
    ctx.beginPath(); ctx.arc(cx,cy,shockR,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  // Pulsing core
  const coreR=8+bands.bass*35+(isBeat?25:0);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,coreR);
  cg.addColorStop(0,`hsla(${h(60)},100%,95%,.9)`);
  cg.addColorStop(.4,`hsla(${colorHue},100%,75%,.5)`);
  cg.addColorStop(1,`hsla(${colorHue},90%,55%,0)`);
  ctx.save(); ctx.globalAlpha=alpha; ctx.fillStyle=cg;
  ctx.beginPath(); ctx.arc(cx,cy,coreR,0,Math.PI*2); ctx.fill(); ctx.restore();

  ctx.restore();
}

// ── PARTICLES ──
let fieldP=[];
function initFieldParticles(){
  fieldP=[];
  for(let i=0;i<180;i++) fieldP.push({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,
    size:Math.random()*2+.5,hue:Math.random()*360,alpha:Math.random()*.5+.2,
    hueOffset:Math.random()*360, // each particle gets own hue offset
  });
}
function drawParticleField(bands,alpha=1){
  const W=canvas.width,H=canvas.height,t=frame/60;
  ctx.save(); ctx.globalAlpha=alpha;

  fieldP.forEach(p=>{
    const bi=Math.min(Math.floor(p.x/W*8)*8+Math.floor(p.y/H*8),freqData?freqData.length-1:0);
    const force=(freqData?freqData[bi]/255:0)*.5;
    const angle=Math.sin(p.x*.005+t)+Math.cos(p.y*.005+t);
    p.vx+=Math.cos(angle)*force*.3; p.vy+=Math.sin(angle)*force*.3+bands.bass*.04;
    p.vx*=.97; p.vy*=.97; p.x+=p.vx; p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    // Color cycles through full spectrum per particle
    p.hue=(colorHue+p.hueOffset+(p.x/W)*120)%360;
    const size=p.size*(1+bands.bass*.6);
    ctx.save(); ctx.globalAlpha=alpha*p.alpha*(0.4+bands.overall*.6);
    ctx.fillStyle=`hsl(${p.hue},85%,68%)`;
    ctx.shadowBlur=size*4; ctx.shadowColor=`hsl(${p.hue},100%,72%)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Connection lines with hue from the particles
  ctx.save(); ctx.lineWidth=.4;
  for(let i=0;i<fieldP.length;i+=2){
    for(let j=i+1;j<fieldP.length;j+=2){
      const dx=fieldP[i].x-fieldP[j].x,dy=fieldP[i].y-fieldP[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){
        const lineHue=(fieldP[i].hue+fieldP[j].hue)/2;
        ctx.globalAlpha=alpha*(.7-d/90)*.12*bands.overall;
        ctx.strokeStyle=`hsl(${lineHue},80%,65%)`;
        ctx.beginPath(); ctx.moveTo(fieldP[i].x,fieldP[i].y);
        ctx.lineTo(fieldP[j].x,fieldP[j].y); ctx.stroke();
      }
    }
  }
  ctx.restore();
  ctx.restore();
}

// ── Freq bars overlay ──
function drawFreqOverlay(){
  if(!freqData) return;
  const W=freqCanvas.width,H=freqCanvas.height,count=96,barW=W/count;
  fCtx.clearRect(0,0,W,H);
  for(let i=0;i<count;i++){
    const val=freqData[Math.floor(i/count*freqData.length*.5)]/255;
    const bh=val*H*.85;
    // bars cycle through full spectrum
    const barHue=(colorHue+(i/count)*180)%360;
    fCtx.fillStyle=`hsla(${barHue},85%,62%,${.18+val*.42})`;
    fCtx.fillRect(i*barW,H-bh,barW-1,bh);
  }
}

// ── Draw a mode by name with alpha ──
function drawMode(mode,bands,isBeat,alpha){
  switch(mode){
    case 'orbital':   drawOrbital(bands,isBeat,alpha); break;
    case 'waveform':  drawWaveform(bands,alpha); break;
    case 'tunnel':    drawTunnel(bands,isBeat,alpha); break;
    case 'particles': drawParticleField(bands,alpha); break;
  }
}

// ── Current effective mode for rendering ──
function getEffectiveMode(){ return autoMode ? autoCurrentMode : visualMode; }

// ════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════
function loop(){
  requestAnimationFrame(loop); frame++;
  const bands=getBands(), isBeat=detectBeat(bands);
  const note=detectNote();
  const mood=classifyMood(bands,bpmSmooth);
  const moodHue=mood.hue, moodSat=mood.sat||85;
  const noteHue=NOTE_HUE[note]||0;

  // Full spectrum target — blend mood hue + note hue, allow wrapping
  let rawTarget = moodHue*.6 + noteHue*.4;
  targetHue = rawTarget;
  targetSat = moodSat;

  // Fast color shift (was .018, now .035 for snappier response)
  const hueDiff=((targetHue-colorHue+540)%360)-180; // shortest path around wheel
  colorHue=(colorHue+hueDiff*.035+360)%360;
  colorSat+=(targetSat-colorSat)*.04;

  moodLabel=mood.label;
  updateAutoMode(moodLabel);

  drawBackground(bands);

  // Beat particles / rings
  if(isBeat&&playing){
    $('beat-ring').style.opacity='1';
    $('beat-ring').style.boxShadow=`inset 0 0 160px hsla(${colorHue},90%,70%,.08)`;
    setTimeout(()=>$('beat-ring').style.opacity='0',90);
    rings.push(new Ring(canvas.width/2,canvas.height/2,colorHue));
    // Second ring with complementary color
    if(bands.bass>.4) rings.push(new Ring(canvas.width/2,canvas.height/2,h(180)));
    const n=Math.floor(5+bands.bass*20);
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,d=Math.random()*200;
      // Particles spread across hue wheel
      particles.push(new Particle(
        canvas.width/2+Math.cos(a)*d,canvas.height/2+Math.sin(a)*d,
        (colorHue+Math.random()*180)%360,
        3+bands.bass*8,1+Math.random()*3.5,45+Math.random()*60));
    }
  }
  if(playing&&Math.random()<bands.high*.28+.015&&particles.length<500){
    particles.push(new Particle(
      Math.random()*canvas.width,canvas.height+5,
      (colorHue+Math.random()*200)%360,
      1.5+Math.random()*2,.5+Math.random()*1.5,90+Math.random()*130));
  }

  // Draw with crossfade
  if(playing){
    if(xfadeAlpha<1){
      xfadeAlpha=Math.min(1,xfadeAlpha+XFADE_SPEED);
      drawMode(xfadeFrom,bands,isBeat,1-xfadeAlpha);
      drawMode(xfadeTo,  bands,isBeat,xfadeAlpha);
    } else {
      const eff=getEffectiveMode();
      drawMode(eff,bands,isBeat,1);
      // sync xfade state
      xfadeFrom=eff; xfadeTo=eff;
    }
  }

  rings.forEach(r=>{r.update();r.draw();}); rings=rings.filter(r=>!r.dead);
  particles.forEach(p=>{p.update();p.draw();}); particles=particles.filter(p=>p.life>0);
  drawFreqOverlay();

  if(playing){
    $('bpm-val').textContent=Math.round(bpmSmooth)||'—';
    $('key-val').textContent=note;
    $('energy-val').textContent=Math.round(bands.overall*100)+'%';
    $('mood-pill').textContent=moodLabel;
    if(audio.duration) $('progress-fill').style.width=(audio.currentTime/audio.duration*100)+'%';
  }
}
loop(); initFieldParticles();

// ════════════════════════════════
//  UI EVENTS
// ════════════════════════════════
function goToLanding(){
  audio.pause(); playing=false; landingVisible=true;
  $('landing').classList.remove('gone');
  $('landing-bg').classList.remove('gone');
  $('hud').classList.remove('visible');
}

function setMode(mode){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-mode="${mode}"]`)?.classList.add('active');
  if(mode==='auto'){
    autoMode=true;
    $('auto-indicator').classList.add('visible');
    // Start from current effective mode
    autoCandidateMode=autoCurrentMode;
    autoCandidateTime=performance.now();
    xfadeFrom=autoCurrentMode; xfadeTo=autoCurrentMode; xfadeAlpha=1;
    notify('AUTO mode on');
  } else {
    autoMode=false;
    $('auto-indicator').classList.remove('visible');
    // crossfade to selected mode
    const prev=getEffectiveMode();
    visualMode=mode;
    beginCrossfade(prev, mode);
    if(mode==='particles') initFieldParticles();
    tunnelAngle=0;
  }
}

$('dropbox').addEventListener('click',()=>$('file-input').click());
$('file-input').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
$('dropbox').addEventListener('dragover',e=>{e.preventDefault();$('dropbox').classList.add('drag-over');});
$('dropbox').addEventListener('dragleave',()=>$('dropbox').classList.remove('drag-over'));
$('dropbox').addEventListener('drop',e=>{
  e.preventDefault();$('dropbox').classList.remove('drag-over');
  if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);
});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();
  if(e.dataTransfer.files[0]&&e.target!==$('dropbox'))loadFile(e.dataTransfer.files[0]);
});

$('btn-play').addEventListener('click',()=>{if(audio.src){playing?audio.pause():audio.play();}});
audio.addEventListener('play',()=>{playing=true;$('btn-play').innerHTML=`<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;});
audio.addEventListener('pause',()=>{playing=false;$('btn-play').innerHTML=`<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;});
$('vol-slider').addEventListener('input',e=>{if(gainNode)gainNode.gain.value=+e.target.value;});
$('progress-wrap').addEventListener('click',e=>{
  const r=$('progress-wrap').getBoundingClientRect();
  if(audio.duration) audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
$('btn-new').addEventListener('click',()=>$('file-input-hidden').click());
$('file-input-hidden').addEventListener('change',e=>{if(e.target.files[0]){loadFile(e.target.files[0]);e.target.value='';}});
$('logo-sm-btn').addEventListener('click',goToLanding);

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>setMode(btn.dataset.mode));
});

let notifTimer;
function notify(msg){
  const el=$('notif');el.textContent=msg;el.classList.add('show');
  clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
  if(e.code==='Space'){e.preventDefault();if(audio.src){playing?audio.pause():audio.play();}}
  if(e.key==='Escape') goToLanding();
  if(e.key==='a'||e.key==='A') setMode(autoMode?'orbital':'auto');
  if(e.key==='m'||e.key==='M'){
    const modes=['auto','orbital','waveform','tunnel','particles'];
    const i=(modes.indexOf(autoMode?'auto':visualMode)+1)%modes.length;
    setMode(modes[i]);
    notify('Mode: '+modes[i]);
  }
});
</script>
